<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAFTA PDF PARSER v2.1</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg: #0f172a; --surface: #1e293b; --text: #e2e8f0;
            --text-secondary: #94a3b8; --border: #334155; --primary: #6366f1;
            --success: #10b981; --danger: #ef4444; --warning: #f59e0b;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 24px; }
        .container { max-width: 1300px; margin: 0 auto; }
        .app-header { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
        .logo-img { width: 48px; height: 48px; border-radius: 12px; object-fit: cover; background: var(--surface); border: 2px solid var(--border); }
        .title-group h1 {
            font-size: 1.8em; font-weight: 800; color: #fff; letter-spacing: -0.02em;
            background: linear-gradient(135deg, var(--primary), #a78bfa);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .title-group .subtitle { color: var(--primary); font-size: 0.9em; font-weight: 500; }
        .version-badge { background: var(--primary); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.8em; font-weight: 600; margin-left: auto; }
        .upload-zone {
            background: var(--surface); border: 2px dashed var(--border); border-radius: 16px;
            padding: 48px; text-align: center; margin-bottom: 24px; transition: 0.3s; cursor: pointer;
        }
        .upload-zone:hover, .upload-zone.drag-over { border-color: var(--primary); background: rgba(99, 102, 241, 0.05); }
        .upload-zone input { display: none; }
        .btn {
            background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 10px;
            font-size: 0.95em; font-weight: 600; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 6px;
        }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        .btn-outline:hover { background: var(--surface); }
        .btn-success { background: var(--success); }

        .stats { display: flex; gap: 16px; margin-bottom: 16px; flex-wrap: wrap; }
        .stat-card { background: #1a2332; padding: 16px; border-radius: 10px; flex: 1; min-width: 150px; text-align: center; }
        .stat-card .number { font-size: 2em; font-weight: 700; }
        .stat-card .label { font-size: 0.85em; color: var(--text-secondary); }

        .results { background: var(--surface); border-radius: 16px; padding: 24px; margin-top: 24px; border: 1px solid var(--border); }
        .results h2 { margin-bottom: 16px; color: var(--primary); }

        table { width: 100%; border-collapse: collapse; font-size: 0.9em; }
        th, td { padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); }
        th { background: #1a2332; color: var(--text-secondary); font-weight: 600; text-transform: uppercase; font-size: 0.8em; letter-spacing: 0.05em; }
        tr:hover td { background: rgba(255,255,255,0.02); }
        .field-name { font-weight: 600; color: var(--text); }
        .value-missing { color: var(--danger); font-style: italic; }
        .section-header { background: #1a2332; font-weight: 700; color: var(--primary); }

        .missing-fields { margin-top: 24px; padding: 16px; background: rgba(239, 68, 68, 0.1); border: 1px solid var(--danger); border-radius: 10px; }
        .missing-fields h3 { color: var(--danger); margin-bottom: 8px; }
        .missing-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .missing-tag { background: var(--danger); color: white; padding: 4px 12px; border-radius: 20px; font-size: 0.8em; }

        .person-tabs { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
        .person-tab {
            padding: 8px 16px; border-radius: 8px; cursor: pointer; background: var(--surface); border: 1px solid var(--border);
            color: var(--text); font-weight: 500; transition: 0.2s;
        }
        .person-tab.active { background: var(--primary); border-color: var(--primary); color: white; }
        .person-tab:hover:not(.active) { border-color: var(--primary); }

        .toast { position: fixed; bottom: 24px; right: 24px; background: var(--success); color: white; padding: 12px 24px; border-radius: 10px; font-weight: 600; z-index: 9999; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } }

        /* Print Styles – Portrait A4, 2 kolom full */
        @media print {
            @page {
                size: A4 portrait;
                margin: 1.2cm 1cm 1.8cm 1cm; /* top right bottom left */
                @top-center { content: element(printHeader); }
                @bottom-center { content: element(printFooter); }
            }
            body {
                background: white; color: black; font-size: 10px;
                column-count: 2;
                column-gap: 12px;
                column-fill: auto;
                margin: 0;
                padding: 0;
            }
            .no-print, .upload-zone, .person-tabs, .stats, .btn, .missing-fields, .section-header { display: none !important; }
            #printArea {
                display: block !important;
                column-span: all; /* keluar dari aliran kolom untuk header/footer */
            }
            .print-header {
                position: running(printHeader);
                text-align: center;
                font-weight: bold;
                border-bottom: 1px solid #000;
                padding-bottom: 4px;
                margin-bottom: 8px;
                column-span: all;
            }
            .print-footer {
                position: running(printFooter);
                text-align: center;
                font-size: 9px;
                border-top: 1px solid #000;
                padding-top: 4px;
                margin-top: 8px;
                column-span: all;
            }
            .print-footer::after { content: "Halaman " counter(page); }
            .print-table {
                width: 100%;
                border-collapse: collapse;
                font-size: 7.5px;
                margin-bottom: 12px;
                break-inside: avoid;
            }
            .print-table th {
                background: #6366f1;
                color: white;
                padding: 4px 2px;
                border: 1px solid #000;
                font-weight: 600;
            }
            .print-table td {
                padding: 3px 2px;
                border: 1px solid #000;
                word-break: break-word;
            }
            .print-form {
                font-size: 9px;
                line-height: 1.35;
            }
            .print-form h2 { font-size: 12px; margin-bottom: 6px; }
            .print-form .field { margin-bottom: 2px; }
            hr { margin: 6px 0; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-header">
            <img class="logo-img" src="https://blogger.googleusercontent.com/img/a/AVvXsEguj3GaSHbNN6TZ8CjI9Mboo18AUxp8qVmS28Ewfr2Xi7xr73DrKcJde-B0Pl8luspmMj3OUyoPuOVQUthYjnjIoTzxCIHMMOo42NHnR_l50jKvumeMnp00Od_HWUJpH4N-icpY9CWwdrZ8SujhWdb7WrJ_g0vaujggUhxeAGlpj__z5K498FEQf5VE_Q=s2560" alt="Logo" onerror="this.style.display='none'">
            <div class="title-group">
                <h1>NAFTA PDF PARSER</h1>
                <div class="subtitle">for Genetic Mapping Dashboard</div>
            </div>
            <span class="version-badge">v2.1</span>
        </div>

        <div class="upload-zone" id="dropZone">
            <div style="font-size: 3em; margin-bottom: 12px;">📄</div>
            <h3>Drop PDF di sini atau klik untuk memilih</h3>
            <p style="color: var(--text-secondary); margin: 8px 0;">Mendukung multi-file dan multi-halaman</p>
            <input type="file" id="fileInput" accept=".pdf" multiple>
            <button class="btn" onclick="document.getElementById('fileInput').click()" style="margin-top: 12px;">📁 Pilih File PDF</button>
        </div>

        <div id="resultsContainer" style="display: none;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; flex-wrap: wrap; gap: 8px;">
                <h2 style="color: var(--primary); margin: 0;">📋 Hasil Parsing (<span id="dataCount">0</span> data)</h2>
                <div style="display: flex; gap: 6px; flex-wrap: wrap;">
                    <button class="btn btn-success" onclick="exportCSV()">📥 CSV</button>
                    <button class="btn btn-success" onclick="exportXLSX()">📊 XLSX</button>
                    <button class="btn btn-success" onclick="exportJSON()">📄 JSON</button>
                    <button class="btn btn-outline" onclick="printForm()">🖨️ Cetak Formulir</button>
                    <button class="btn btn-outline" onclick="printTable()">📑 Cetak Tabel</button>
                </div>
            </div>
            <div class="stats" id="statsContainer"></div>
            <div class="person-tabs" id="personTabs"></div>
            <div class="results">
                <div style="overflow-x: auto;">
                    <table id="resultsTable"></table>
                </div>
                <div class="missing-fields" id="missingFieldsContainer" style="display: none;">
                    <h3>⚠️ Field yang Tidak Terisi</h3>
                    <div class="missing-list" id="missingList"></div>
                </div>
            </div>
        </div>
        <div id="printArea" style="display: none;"></div>
    </div>

    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
        let allPersons = [];
        let currentPersonIndex = 0;

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const resultsContainer = document.getElementById('resultsContainer');
        const statsContainer = document.getElementById('statsContainer');
        const resultsTable = document.getElementById('resultsTable');
        const missingFieldsContainer = document.getElementById('missingFieldsContainer');
        const missingList = document.getElementById('missingList');
        const personTabs = document.getElementById('personTabs');
        const dataCountSpan = document.getElementById('dataCount');
        const printArea = document.getElementById('printArea');

        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
        dropZone.addEventListener('drop', e => {
            e.preventDefault();
            dropZone.classList.remove('drag-over');
            const files = Array.from(e.dataTransfer.files).filter(f => f.type === 'application/pdf');
            if (files.length) processFiles(files);
        });
        fileInput.addEventListener('change', e => {
            const files = Array.from(e.target.files).filter(f => f.type === 'application/pdf');
            if (files.length) processFiles(files);
            fileInput.value = '';
        });

        async function processFiles(files) {
            allPersons = [];
            for (const file of files) {
                try {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const content = await page.getTextContent();
                        const pageText = content.items.map(item => item.str).join(' ');
                        const person = parsePage(pageText);
                        if (person && person.id !== '_') allPersons.push(person);
                    }
                } catch (err) { alert('❌ Gagal membaca file: ' + file.name); }
            }
            if (allPersons.length === 0) { alert('Tidak ada data yang berhasil diparsing.'); return; }
            currentPersonIndex = 0;
            displayResults();
        }

        function parsePage(text) {
            const clean = text.replace(/\s+/g, ' ').trim();
            const data = {};

            let nama = '';
            const taglineMatch = clean.match(/Membaca Fitrah Genetik Melalui Sidik Jari\s+([A-Z][A-Z\s]+?)\s+ID\s+\d+/i);
            if (taglineMatch) nama = taglineMatch[1].trim();
            else {
                const fallback = clean.match(/([A-Z][A-Z\s]+?)\s+ID\s+\d+/i);
                nama = fallback ? fallback[1].trim() : '_';
            }
            data.nama = nama || '_';

            data.id = (clean.match(/ID\s+(\d+)/i) || [])[1] || '_';
            const dateMatch = clean.match(/Date\s+(\d{1,2}\s*[-–/\s]\s*\d{1,2}\s*[-–/\s]\s*\d{2,4}|\d{1,2}\s+\w+\s+\d{4})/i);
            data.tanggal = dateMatch ? dateMatch[1].replace(/\s+/g, ' ').trim() : '_';

            const noteMatch = clean.match(/Analyzer'?s?\s*Note\s*([A-Z]+-\w+)\s+([\d\-]+)\s+([\d\-]+)(?:\s+TT\s+TT)?/i);
            if (noteMatch) {
                data.analyzer_pola = noteMatch[1].trim();
                data.atd_kiri = noteMatch[2].trim();
                data.atd_kanan = noteMatch[3].trim();
            } else {
                data.analyzer_pola = data.atd_kiri = data.atd_kanan = '_';
            }

            const extractNumber = (label) => {
                const regex = new RegExp(label.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\s*[:]?\\s*([\\d,.]+)', 'i');
                const m = clean.match(regex);
                return m ? parseFloat(m[1].replace(',', '.')) : 0;
            };

            data.otak_kiri = extractNumber('Otak Kiri');
            data.otak_kanan = extractNumber('Otak Kanan');
            const diff = Math.abs(data.otak_kiri - data.otak_kanan);
            data.perbedaan = parseFloat(diff.toFixed(2));
            data.dominasi = data.otak_kiri > data.otak_kanan + 1 ? 'Kiri' : data.otak_kanan > data.otak_kiri + 1 ? 'Kanan' : 'Seimbang';
            data.iq = extractNumber('IQ');
            data.eq = extractNumber('EQ');
            data.level_unik = parseInt(extractNumber('Level Unik')) || 0;

            function extractAfterStrict(label, nextLabels) {
                const escapedLabel = label.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                const headerPattern = '(?:^|\\. )' + escapedLabel + '\\s*[:]?\\s*';
                const labelRegex = new RegExp(headerPattern, 'i');
                let startIdx;
                const labelMatch = clean.match(labelRegex);
                if (labelMatch) {
                    startIdx = labelMatch.index + labelMatch[0].length;
                } else {
                    const fallbackRegex = new RegExp('\\b' + escapedLabel + '\\b\\s*[:]?\\s*', 'i');
                    const fallbackMatch = clean.match(fallbackRegex);
                    if (!fallbackMatch) return '';
                    startIdx = fallbackMatch.index + fallbackMatch[0].length;
                }
                const remaining = clean.slice(startIdx);
                for (const nextLabel of nextLabels) {
                    const escapedNext = nextLabel.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                    const nextHeaderPattern = '(?:^|\\. )' + escapedNext + '\\b';
                    const nextRegex = new RegExp(nextHeaderPattern, 'i');
                    const nextMatch = remaining.match(nextRegex);
                    if (nextMatch) return remaining.slice(0, nextMatch.index).trim();
                    const nextFallback = new RegExp('\\b' + escapedNext + '\\b', 'i');
                    const fallbackNext = remaining.match(nextFallback);
                    if (fallbackNext) return remaining.slice(0, fallbackNext.index).trim();
                }
                return remaining.trim();
            }

            data.normalitas = extractAfterStrict('Normalitas', ['Komunikasi']);
            data.komunikasi = extractAfterStrict('Komunikasi', ['Tipe Personal', 'Inisiatif']);
            data.tipe_personal = extractAfterStrict('Tipe Personal', ['Inisiatif']) || '_';
            data.inisiatif = extractAfterStrict('Inisiatif', ['Kebosanan']);
            data.kebosanan = extractAfterStrict('Kebosanan', ['Pendapat']);
            data.pendapat = extractAfterStrict('Pendapat', ['Analisa']);
            data.analisa = extractAfterStrict('Analisa', ['Kepatuhan']);
            data.kepatuhan = extractAfterStrict('Kepatuhan', ['Level Unik']);

            const maxLen = 250;
            ['normalitas','komunikasi','tipe_personal','inisiatif','kebosanan','pendapat','analisa','kepatuhan'].forEach(f => {
                if (data[f] && data[f].length > maxLen) data[f] = '_';
            });

            const gayaLabels = ['Pembangun', 'Pengambil Kesimpulan', 'Pelaku', 'Komunikator', 'Deal Maker', 'Pedagang', 'Pencipta'];
            data.gaya_kerja = {};
            gayaLabels.forEach(label => {
                const regex = new RegExp(label.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\s+(Sangat Menonjol|Menonjol|Sedang)\\s*(\\d+)?', 'i');
                const m = clean.match(regex);
                data.gaya_kerja[label.toLowerCase().replace(/\s+/g, '_')] = m ? { nilai: m[2] ? parseInt(m[2]) : 0, kategori: m[1] } : { nilai: 0, kategori: '_' };
            });

            const priorLabels = ['Sosial', 'Keuntungan', 'Popularitas', 'Pemenang', 'Kebebasan', 'Kedamaian', 'Pengetahuan', 'Kemewahan', 'Kenyamanan', 'Distinksi', 'Kekuasaan', 'Pengakuan', 'Sanjungan'];
            data.prioritas = {};
            priorLabels.forEach(label => {
                const regex = new RegExp(label.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\s+(\\d+,\\d+)%', 'i');
                const m = clean.match(regex);
                data.prioritas[label.toLowerCase()] = m ? parseFloat(m[1].replace(',', '.')) : 0;
            });

            data.motivasi = {
                afektif: extractNumber('Afektif'), kognitif: extractNumber('Kognitif'),
                kritis: extractNumber('Kritis'), reflektif: extractNumber('Reflektif')
            };

            const lakiMatch = clean.match(/Apabila Anda Laki-laki,?\s*(.+?)(?=Apabila Anda Perempuan|$)/is);
            const perempuanMatch = clean.match(/Apabila Anda Perempuan,?\s*(.+?)(?=PLS|Keterangan|$)/is);
            data.pola_hidup_laki = lakiMatch ? lakiMatch[1].trim() : '_';
            data.pola_hidup_perempuan = perempuanMatch ? perempuanMatch[1].trim() : '_';
            data.keterangan = extractAfterStrict('Keterangan', ['Kecerdasan Majemuk']) || '_';

            const kecLabels = ['Intra Personal', 'Logika Matematika', 'Bahasa', 'Inter Personal', 'Body Kinestetis', 'Musikal', 'Naturalis', 'Visual 2D', 'Visual 3D'];
            data.kecerdasan_majemuk = {};
            kecLabels.forEach(label => {
                const regex = new RegExp(label.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\s+(Sangat Menonjol|Menonjol|Sedang)\\s*(\\d+)?', 'i');
                const m = clean.match(regex);
                data.kecerdasan_majemuk[label.toLowerCase().replace(/\s+/g, '_')] = m ? { nilai: m[2] ? parseInt(m[2]) : 0, kategori: m[1] } : { nilai: 0, kategori: '_' };
            });

            const kemLabels = ['Penalaran', 'Pengendalian Diri', 'Mengelola Angka', 'Motorik Halus', 'Pemahaman', 'Kreativitas', 'Kepemimpinan', 'Konsep Seni', 'Imajinasi', 'Motorik Kasar', 'Pola Abstrak', 'Menggambar', 'Analisa Ukur', 'Analisa Seni', 'Psikologi', 'Akademisi', 'Ketekunan', 'Kemandirian'];
            data.kemampuan_alami = {};
            kemLabels.forEach(label => {
                const regex = new RegExp(label.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\s+(Sangat Menonjol|Menonjol|Sedang)\\s*(\\d+)?', 'i');
                const m = clean.match(regex);
                data.kemampuan_alami[label.toLowerCase().replace(/\s+/g, '_')] = m ? { nilai: m[2] ? parseInt(m[2]) : 0, kategori: m[1] } : { nilai: 0, kategori: '_' };
            });

            const tipeLabels = ['Visual', 'Audio', 'Kinestetik', 'Thinker', 'Imaginator'];
            data.tipe_belajar = {};
            tipeLabels.forEach(label => {
                const regex = new RegExp(label.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\s+(Sangat Menonjol|Menonjol|Sedang)\\s*(\\d+)?', 'i');
                const m = clean.match(regex);
                data.tipe_belajar[label.toLowerCase()] = m ? { nilai: m[2] ? parseInt(m[2]) : 0, kategori: m[1] } : { nilai: 0, kategori: '_' };
            });

            const plsBlock = clean.match(/PLS\s+(.+)/is);
            if (plsBlock) {
                const plsText = plsBlock[1];
                data.cara_belajar = (plsText.match(/Cara Belajar\s*:\s*(.+?)(?=Kelebihan|$)/i) || [])[1]?.trim() || '_';
                data.kelebihan = (plsText.match(/Kelebihan\s*:\s*(.+?)(?=Kelemahan|$)/i) || [])[1]?.trim() || '_';
                data.kelemahan = (plsText.match(/Kelemahan\s*:\s*(.+?)(?=$)/i) || [])[1]?.trim() || '_';
            } else {
                data.cara_belajar = data.kelebihan = data.kelemahan = '_';
            }

            ['iq','eq','level_unik','otak_kiri','otak_kanan','perbedaan'].forEach(f => { if (isNaN(data[f])) data[f] = 0; });
            return data;
        }

        function switchPerson(index) {
            currentPersonIndex = index;
            displayCurrentPerson();
            document.querySelectorAll('.person-tab').forEach((tab, i) => tab.classList.toggle('active', i === index));
        }

        function displayResults() {
            resultsContainer.style.display = 'block';
            dataCountSpan.textContent = allPersons.length;
            personTabs.innerHTML = allPersons.map((p, i) => {
                const name = p.nama && p.nama !== '_' ? p.nama : (p.id !== '_' ? `ID: ${p.id}` : `Orang ${i+1}`);
                return `<span class="person-tab ${i === currentPersonIndex ? 'active' : ''}" onclick="switchPerson(${i})">${name}</span>`;
            }).join('');
            displayCurrentPerson();
            showToast(`✅ ${allPersons.length} orang berhasil diparsing`);
        }

        function displayCurrentPerson() {
            const data = allPersons[currentPersonIndex];
            if (!data) return;
            const total = countTotalFields(data);
            const filled = countFilledFields(data);
            const missing = total - filled;
            statsContainer.innerHTML = `
                <div class="stat-card"><div class="number" style="color: var(--primary);">${total}</div><div class="label">Total Field</div></div>
                <div class="stat-card"><div class="number" style="color: var(--success);">${filled}</div><div class="label">Terisi</div></div>
                <div class="stat-card"><div class="number" style="color: var(--danger);">${missing}</div><div class="label">Kosong</div></div>
            `;

            const rows = [];
            const addRow = (section, field, value) => rows.push({ section, field, value: value != null ? value : '_' });

            addRow('Identity', 'Nama', data.nama);
            addRow('Identity', 'ID', data.id);
            addRow('Identity', 'Tanggal', data.tanggal);
            addRow('Identity', 'Analyzer Pola', data.analyzer_pola);
            addRow('Identity', 'ATD Kiri', data.atd_kiri);
            addRow('Identity', 'ATD Kanan', data.atd_kanan);
            addRow('Dominasi Otak', 'Otak Kiri', data.otak_kiri + '%');
            addRow('Dominasi Otak', 'Otak Kanan', data.otak_kanan + '%');
            addRow('Dominasi Otak', 'Perbedaan', data.perbedaan + '%');
            addRow('Dominasi Otak', 'Dominasi', data.dominasi);
            addRow('Hasil IQ & EQ', 'IQ', data.iq);
            addRow('Hasil IQ & EQ', 'EQ', data.eq);
            addRow('Karakter', 'Level Unik', data.level_unik);
            ['normalitas','komunikasi','tipe_personal','inisiatif','kebosanan','pendapat','analisa','kepatuhan'].forEach(f => {
                addRow('Karakter', f.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()), data[f] || '_');
            });
            Object.entries(data.gaya_kerja).forEach(([key, val]) => {
                const display = val.kategori === '_' ? 'Tidak ditemukan' : `${val.kategori} (${val.nilai})`;
                addRow('Gaya Kerja', key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()), display);
            });
            Object.entries(data.prioritas).forEach(([key, val]) => addRow('Prioritas', key, val + '%'));
            Object.entries(data.motivasi).forEach(([key, val]) => addRow('Motivasi', key, val + '%'));
            addRow('Pola Hidup', 'Laki-laki', data.pola_hidup_laki);
            addRow('Pola Hidup', 'Perempuan', data.pola_hidup_perempuan);
            addRow('Keterangan', 'Keterangan', data.keterangan);
            Object.entries(data.kecerdasan_majemuk).forEach(([key, val]) => {
                const display = val.kategori === '_' ? 'Tidak ditemukan' : `${val.kategori} (${val.nilai})`;
                addRow('Kecerdasan Majemuk', key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()), display);
            });
            Object.entries(data.kemampuan_alami).forEach(([key, val]) => {
                const display = val.kategori === '_' ? 'Tidak ditemukan' : `${val.kategori} (${val.nilai})`;
                addRow('Kemampuan Alami', key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()), display);
            });
            Object.entries(data.tipe_belajar).forEach(([key, val]) => {
                const display = val.kategori === '_' ? 'Tidak ditemukan' : `${val.kategori} (${val.nilai})`;
                addRow('Tipe Belajar', key, display);
            });
            addRow('PLS', 'Cara Belajar', data.cara_belajar);
            addRow('PLS', 'Kelebihan', data.kelebihan);
            addRow('PLS', 'Kelemahan', data.kelemahan);

            let tableHTML = '<thead><tr><th>Kategori</th><th>Field</th><th>Nilai</th></tr></thead><tbody>';
            let currentSection = '';
            const missingFieldNames = [];
            rows.forEach(row => {
                if (row.section !== currentSection) {
                    currentSection = row.section;
                    tableHTML += `<tr class="section-header"><td colspan="3">📌 ${currentSection}</td></tr>`;
                }
                const strValue = String(row.value);
                const isMissing = strValue === '_' || strValue === '0' || strValue === '0%' || strValue.includes('(0)') || strValue === 'Tidak ditemukan';
                tableHTML += `<tr><td></td><td class="field-name">${row.field}</td><td class="${isMissing ? 'value-missing' : ''}">${strValue}</td></tr>`;
                if (isMissing) missingFieldNames.push(`${row.section} > ${row.field}`);
            });
            tableHTML += '</tbody>';
            resultsTable.innerHTML = tableHTML;

            if (missingFieldNames.length > 0) {
                missingFieldsContainer.style.display = 'block';
                missingList.innerHTML = missingFieldNames.map(f => `<span class="missing-tag">${f}</span>`).join('');
            } else {
                missingFieldsContainer.style.display = 'none';
            }
        }

        function countTotalFields(data) { return 6 + 4 + 2 + 1 + 8 + Object.keys(data.gaya_kerja).length + Object.keys(data.prioritas).length + 4 + 2 + 1 + Object.keys(data.kecerdasan_majemuk).length + Object.keys(data.kemampuan_alami).length + Object.keys(data.tipe_belajar).length + 3; }
        function countFilledFields(data) {
            let count = 0;
            const check = (val) => {
                if (typeof val === 'object' && val !== null) {
                    if ('nilai' in val) { if (val.nilai !== 0 && val.kategori !== '_') count++; }
                    else Object.values(val).forEach(v => check(v));
                } else { if (String(val) !== '_' && String(val) !== '0' && val !== '' && val !== '0%') count++; }
            };
            check(data);
            return count;
        }

        function getFlatData() {
            return allPersons.map(p => ({
                nama: p.nama, id: p.id, tanggal: p.tanggal,
                analyzer_pola: p.analyzer_pola, atd_kiri: p.atd_kiri, atd_kanan: p.atd_kanan,
                otak_kiri: p.otak_kiri, otak_kanan: p.otak_kanan, perbedaan: p.perbedaan, dominasi: p.dominasi,
                iq: p.iq, eq: p.eq, level_unik: p.level_unik,
                normalitas: p.normalitas, komunikasi: p.komunikasi, tipe_personal: p.tipe_personal,
                inisiatif: p.inisiatif, kebosanan: p.kebosanan, pendapat: p.pendapat,
                analisa: p.analisa, kepatuhan: p.kepatuhan,
                ...Object.fromEntries(Object.entries(p.gaya_kerja).map(([k, v]) => [`gaya_${k}`, `${v.kategori} (${v.nilai})`])),
                ...Object.fromEntries(Object.entries(p.prioritas).map(([k, v]) => [`prioritas_${k}`, v])),
                motivasi_afektif: p.motivasi.afektif, motivasi_kognitif: p.motivasi.kognitif,
                motivasi_kritis: p.motivasi.kritis, motivasi_reflektif: p.motivasi.reflektif,
                pola_laki: p.pola_hidup_laki, pola_perempuan: p.pola_hidup_perempuan,
                keterangan: p.keterangan,
                ...Object.fromEntries(Object.entries(p.kecerdasan_majemuk).map(([k, v]) => [`kec_${k}`, `${v.kategori} (${v.nilai})`])),
                ...Object.fromEntries(Object.entries(p.kemampuan_alami).map(([k, v]) => [`kem_${k}`, `${v.kategori} (${v.nilai})`])),
                ...Object.fromEntries(Object.entries(p.tipe_belajar).map(([k, v]) => [`tipe_${k}`, `${v.kategori} (${v.nilai})`])),
                cara_belajar: p.cara_belajar, kelebihan: p.kelebihan, kelemahan: p.kelemahan
            }));
        }

        function exportCSV() {
            if (!allPersons.length) return;
            const flat = getFlatData();
            const headers = Object.keys(flat[0]);
            const csv = [headers.join(','), ...flat.map(r => headers.map(h => `"${String(r[h]||'').replace(/"/g,'""')}"`).join(','))].join('\n');
            const blob = new Blob(['\uFEFF'+csv], {type:'text/csv'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `nafta_parsed_${new Date().toISOString().slice(0,10)}.csv`; a.click();
            showToast('📥 CSV berhasil diunduh');
        }

        function exportXLSX() {
            if (!allPersons.length) return;
            const ws = XLSX.utils.json_to_sheet(getFlatData());
            const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "Data");
            XLSX.writeFile(wb, `nafta_parsed_${new Date().toISOString().slice(0,10)}.xlsx`);
            showToast('📊 XLSX berhasil diunduh');
        }

        function exportJSON() {
            if (!allPersons.length) return;
            const blob = new Blob([JSON.stringify(allPersons, null, 2)], {type:'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `nafta_parsed_${new Date().toISOString().slice(0,10)}.json`; a.click();
            showToast('📄 JSON berhasil diunduh');
        }

        function printTable() {
            if (!allPersons.length) return;
            const flat = getFlatData();
            const headers = Object.keys(flat[0]);
            const logoUrl = 'https://blogger.googleusercontent.com/img/a/AVvXsEguj3GaSHbNN6TZ8CjI9Mboo18AUxp8qVmS28Ewfr2Xi7xr73DrKcJde-B0Pl8luspmMj3OUyoPuOVQUthYjnjIoTzxCIHMMOo42NHnR_l50jKvumeMnp00Od_HWUJpH4N-icpY9CWwdrZ8SujhWdb7WrJ_g0vaujggUhxeAGlpj__z5K498FEQf5VE_Q=s2560';
            const now = new Date().toLocaleDateString('id-ID', { day:'numeric', month:'long', year:'numeric' });
            const chunkSize = 10;
            const chunks = [];
            for (let i = 0; i < headers.length; i += chunkSize) chunks.push(headers.slice(i, i + chunkSize));
            let tables = '';
            chunks.forEach((chunk, idx) => {
                tables += `<table class="print-table"><thead><tr>${chunk.map(h => `<th>${h}</th>`).join('')}</tr></thead><tbody>`;
                flat.forEach(row => {
                    tables += '<tr>' + chunk.map(h => `<td>${row[h] != null ? row[h] : ''}</td>`).join('') + '</tr>';
                });
                tables += '</tbody></table>';
            });
            const printContent = `
                <div class="print-header">
                    <img src="${logoUrl}" style="height: 28px; vertical-align: middle;"> 
                    <strong>LAPORAN GENETIC MAPPING</strong>
                </div>
                ${tables}
                <div class="print-footer">Dicetak oleh NAFTA PDF Parser v2.1 pada ${now} | </div>
            `;

            printArea.style.display = 'block';

        function showToast(msg) {

            if (old) old.remove();
            const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
            document.body.appendChild(t); setTimeout(() => t.remove(), 3000);
